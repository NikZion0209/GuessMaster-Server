name: Deploy .NET App to EC2

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Publish .NET app
      run: dotnet publish -c Release -o publish
        
  deploy:
    runs-on: self-hosted

    steps:
    - name: Move to app dir
      run: |
          cp -r publish/* /home/ec2-user/Guess-Master-ec2/
          sudo systemctl restart myapp

