<div class="game-container">
  <app-word-list [words]="words" (wordSelected)="onWordSelected($event.word, $event.mouse)"></app-word-list>
  <canvas id="matchCanvas" #matchCanvas></canvas>
  <app-image-list [images]="images" (imageSelected)="onImageSelected($event.image, $event.mouse)"></app-image-list>
</div>
