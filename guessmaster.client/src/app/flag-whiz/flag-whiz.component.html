<div class="game-stats">
    <app-timer [time]="time"></app-timer>
    <app-score [score]="score"></app-score>
  </div>
  <div class="game-container">
    <app-image-single [image]="currentFlag"></app-image-single>
    <app-word-options [words]="words" (wordSelected)="onWordSelected($event.word)"></app-word-options>
  </div>
